<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UniConnect — Reset Password</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',Arial,sans-serif}
        body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#cacce8,#f8fafc);padding:20px}

        .card{
            width:100%;max-width:440px;background:#fff;border-radius:28px;
            box-shadow:0 16px 48px rgba(13,9,52,.12),0 2px 10px rgba(13,9,52,.06);
            overflow:hidden;
        }

        .card-header{
            background:linear-gradient(135deg,#0d0934,#152780);
            padding:32px 36px 28px;color:#fff;
        }
        .card-header h1{font-size:26px;font-weight:800;margin-bottom:6px}
        .card-header p{font-size:14px;color:#c7d2fe;line-height:1.6}

        .card-body{padding:32px 36px 40px}

        .field-label{
            display:block;margin-bottom:7px;
            font-size:13px;font-weight:600;color:#374151;
        }
        .field-wrap{position:relative;margin-bottom:18px}
        .field-input{
            width:100%;padding:13px 46px 13px 15px;border-radius:14px;
            border:1.5px solid #dbe1e8;background:#fafafa;
            outline:none;font-size:14px;transition:.25s;
        }
        .field-input:focus{border-color:#0d0934;background:#fff;box-shadow:0 0 0 4px rgba(14,9,41,.08)}
        .toggle-eye{
            position:absolute;right:15px;top:50%;transform:translateY(-50%);
            background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;
            padding:0;line-height:1;
        }
        .toggle-eye:hover{color:#374151}

        /* ── Strength meter ── */
        .strength-bar{
            height:4px;border-radius:99px;background:#e5e7eb;
            margin-top:6px;margin-bottom:6px;overflow:hidden;
        }
        .strength-fill{height:100%;border-radius:99px;width:0;transition:width .4s,background .4s}

        .strength-label{font-size:12px;font-weight:600;color:#9ca3af;margin-bottom:4px}

        /* ── Requirements list ── */
        .req-list{list-style:none;margin-bottom:20px}
        .req-list li{
            font-size:12.5px;color:#9ca3af;display:flex;align-items:center;
            gap:7px;margin-bottom:5px;transition:.25s;
        }
        .req-list li.met{color:#16a34a}
        .req-list li .dot{
            width:16px;height:16px;border-radius:50%;border:1.5px solid #d1d5db;
            display:flex;align-items:center;justify-content:center;font-size:9px;
            flex-shrink:0;transition:.25s;
        }
        .req-list li.met .dot{background:#dcfce7;border-color:#22c55e;color:#16a34a}

        .msg{font-size:13px;margin-bottom:10px;min-height:18px}
        .msg.error{color:#ef4444}
        .msg.success{color:#16a34a}

        .submit-btn{
            width:100%;padding:15px;border:none;
            border-radius:14px;background:linear-gradient(135deg,#0d0934,#152780);
            color:#fff;font-size:15px;font-weight:700;cursor:pointer;
            transition:.25s;font-family:inherit;
        }
        .submit-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,9,52,.25)}
        .submit-btn:disabled{opacity:.6;cursor:not-allowed}

        /* ── Success state ── */
        .success-view{
            display:none;text-align:center;padding:20px 0 8px;
        }
        .success-ring{
            width:80px;height:80px;border-radius:50%;
            background:linear-gradient(135deg,#dcfce7,#bbf7d0);
            border:2px solid rgba(34,197,94,.2);
            display:flex;align-items:center;justify-content:center;
            margin:0 auto 20px;
        }
        @keyframes drawCheck{from{stroke-dashoffset:60}to{stroke-dashoffset:0}}
        .check-stroke{stroke-dasharray:60;stroke-dashoffset:60;animation:drawCheck .5s .2s ease forwards}
        .success-view h2{font-size:22px;font-weight:800;color:#0d0934;margin-bottom:10px}
        .success-view p{font-size:14px;color:#6b7280;line-height:1.7;max-width:280px;margin:0 auto 24px}

        @media(max-width:500px){
            .card-header,.card-body{padding-left:22px;padding-right:22px}
        }
    </style>
</head>
<body>

<div class="card">

    <div class="card-header">
        <h1>&#128274; New Password</h1>
        <p>Choose a strong password for your account</p>
    </div>

    <div class="card-body">

        <!-- ── Form view ── -->
        <div id="formView">
            <p class="msg error" id="topMsg"></p>

            <label class="field-label">New Password</label>
            <div class="field-wrap">
                <input class="field-input" type="password" id="newPassword"
                       placeholder="Enter new password" oninput="checkStrength()">
                <button class="toggle-eye" onclick="toggleVis('newPassword', this)">👁</button>
            </div>

            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <p class="strength-label" id="strengthLabel">Strength: —</p>

            <ul class="req-list" id="reqList">
                <li id="req-len"><span class="dot">✓</span> At least 8 characters</li>
                <li id="req-upper"><span class="dot">✓</span> One uppercase letter</li>
                <li id="req-num"><span class="dot">✓</span> One number</li>
                <li id="req-special"><span class="dot">✓</span> One special character</li>
            </ul>

            <label class="field-label">Confirm Password</label>
            <div class="field-wrap">
                <input class="field-input" type="password" id="confirmPassword"
                       placeholder="Re-enter new password">
                <button class="toggle-eye" onclick="toggleVis('confirmPassword', this)">👁</button>
            </div>

            <p class="msg error" id="formMsg"></p>

            <button class="submit-btn" id="resetBtn" onclick="resetPassword()">
                Reset Password
            </button>
        </div>

        <!-- ── Success view ── -->
        <div class="success-view" id="successView">
            <div class="success-ring">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                    <path class="check-stroke" d="M11 21l7 7 11-14"
                          stroke="#16a34a" stroke-width="2.8"
                          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                </svg>
            </div>
            <h2>Password Reset! 🎉</h2>
            <p>Your password has been updated successfully. You can now log in with your new password.</p>
            <button class="submit-btn" onclick="window.location.href='login.html'">
                Go to Login &rarr;
            </button>
        </div>

    </div>
</div>

<script>
// ── Guard: must have a reset token ────────────────────────────────────────
const resetToken = sessionStorage.getItem("resetToken");

if (!resetToken) {
    document.getElementById("topMsg").innerText =
        "Session expired or invalid. Please restart the password reset process.";
    document.getElementById("resetBtn").disabled = true;
}

// ── Toggle password visibility ─────────────────────────────────────────────
function toggleVis(inputId, btn) {
    const el  = document.getElementById(inputId);
    const isHidden = el.type === "password";
    el.type   = isHidden ? "text" : "password";
    btn.innerText = isHidden ? "🙈" : "👁";
}

// ── Password strength meter ────────────────────────────────────────────────
const requirements = {
    "req-len":     v => v.length >= 8,
    "req-upper":   v => /[A-Z]/.test(v),
    "req-num":     v => /[0-9]/.test(v),
    "req-special": v => /[^A-Za-z0-9]/.test(v)
};

function checkStrength() {
    const val   = document.getElementById("newPassword").value;
    let score   = 0;

    Object.entries(requirements).forEach(([id, test]) => {
        const li = document.getElementById(id);
        if (test(val)) { li.classList.add("met"); score++; }
        else           { li.classList.remove("met"); }
    });

    const fill  = document.getElementById("strengthFill");
    const label = document.getElementById("strengthLabel");
    const colors = ["#ef4444","#f97316","#eab308","#22c55e"];
    const labels = ["Weak","Fair","Good","Strong"];
    const widths = ["25%","50%","75%","100%"];

    fill.style.width      = score > 0 ? widths[score - 1] : "0";
    fill.style.background = score > 0 ? colors[score - 1] : "";
    label.innerText       = score > 0 ? `Strength: ${labels[score - 1]}` : "Strength: —";
    label.style.color     = score > 0 ? colors[score - 1] : "#9ca3af";
}

// ── Reset password ─────────────────────────────────────────────────────────
async function resetPassword() {
    const newPassword     = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const msgEl           = document.getElementById("formMsg");
    msgEl.className       = "msg";
    msgEl.innerText       = "";

    if (newPassword.length < 8) {
        msgEl.className = "msg error";
        msgEl.innerText = "Password must be at least 8 characters.";
        return;
    }

    const allMet = Object.values(requirements).every(fn => fn(newPassword));
    if (!allMet) {
        msgEl.className = "msg error";
        msgEl.innerText = "Please meet all password requirements.";
        return;
    }

    if (newPassword !== confirmPassword) {
        msgEl.className = "msg error";
        msgEl.innerText = "Passwords do not match.";
        return;
    }

    const btn   = document.getElementById("resetBtn");
    btn.disabled  = true;
    btn.innerText = "Resetting…";

    try {
        const res  = await fetch("http://localhost:3000/api/auth/reset-password", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ resetToken, newPassword })
        });
        const data = await res.json();

        if (data.success) {
            sessionStorage.removeItem("resetToken");
            document.getElementById("formView").style.display    = "none";
            document.getElementById("successView").style.display = "block";
        } else {
            msgEl.className = "msg error";
            msgEl.innerText = data.message || "Reset failed. Please try again.";
            btn.disabled  = false;
            btn.innerText = "Reset Password";
        }
    } catch {
        msgEl.className = "msg error";
        msgEl.innerText = "Server error. Please try again.";
        btn.disabled  = false;
        btn.innerText = "Reset Password";
    }
}
</script>
</body>
</html>
